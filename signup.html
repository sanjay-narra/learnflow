<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up – LearnFlow</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="nav">
    <a href="index.html" class="nav-logo">Learn<span>Flow</span></a>
    <div class="nav-cta">
      <span style="font-size:14px;color:var(--text-muted)">Already have an account?</span>
      <a href="signup.html" class="btn btn-ghost">Sign in</a>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="nav-logo">Learn<span>Flow</span></a>
      <h2>Create your account</h2>
      <p class="auth-sub">Your first week is completely free. No credit card needed.</p>

      <button class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider">or</div>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Sanjay Narra" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
          Create free account
        </button>
      </form>

      <p class="auth-switch">Already have an account? <a href="signup.html">Sign in</a></p>
      <p style="font-size:12px;color:var(--text-light);text-align:center;margin-top:16px;line-height:1.6">
        By signing up, you agree to our Terms of Service and Privacy Policy.
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
